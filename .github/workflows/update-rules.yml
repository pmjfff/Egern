name: Rule_Generate

on:
  schedule:
    - cron: '0 20 * * *'  # UTC 20:00 = 北京时间 次日 4:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: pip install requests -q

      - name: "拉取"
        run: python .github/workflows/Get_File.py

      - name: "合并"
        run: python .github/workflows/Merge_File.py

      - name: Commit files
        run: |
          git config --local user.email "pmjfff@gmail.com"
          git config --local user.name "PMJFFF"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Rules"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
