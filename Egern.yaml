ipv6: false
vif_only: true
geoip_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-Country.mmdb
asn_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb
proxy_latency_test_url: http://1.1.1.1/generate_204
direct_latency_test_url: http://connectivitycheck.platform.hicloud.com/generate_204
dns:
  bootstrap:
  - 223.5.5.5
  - 119.29.29.29
  upstreams:
    ForeignDNS:
    - h3://dns.google/dns-query
    - h3://cloudflare-dns.com/dns-query
    DomesticDNS:
    - h3://dns.pub/dns-query
    - h3://dns.alidns.com/dns-query
  forward:
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Advertising/Advertising_Domain.list
      value: REJECT
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Proxy/Proxy_Domain.list
      value: ForeignDNS
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/ChinaMax/ChinaMax_Domain.list
      value: DomesticDNS
      disabled: false
  - domain_wildcard:
      match: '*'
      value: ForeignDNS
      disabled: false
  proxy_nameservers:
  - h3://dns.pub/dns-query
  - h3://dns.alidns.com/dns-query
  public_ip_lookup_url: https://api.myip.la
